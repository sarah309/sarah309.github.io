<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Education</title>
  </head>
  <body>
    <header>
      <a href="index.html" id="logo_link">
        <img src="images/logo.png" alt="Dry Oar Logo" />
      </a>
    </header>
    <div id="hero">
      <div id="hero-box">
        <img
          id="hero-img"
          src="images/hero.png"
          alt="People enjoying white water rafting"
        />
      </div>
      <section id="hero-msg">
        <h1 class="home-title">Have An Adventure</h1>
        <h4>Make Memories With Dry Oar</h4>
        <div class="button-box">
          <a class="book" href="contactus.html">Book Now</a>
        </div>
      </section>
    </div>
    <main class="home-grid">
      <section class="rivers-card">
        <img class="card-img" src="images/camping.jpg" alt="river in forest" />
        <img class="icon" src="images/river_icon.png" alt="river icon" />
        <h2>Rivers</h2>
      </section>
      <section class="camping-card">
        <!-- Sometimes the image element will be on a different line for each attribute, why? -->
        <img
          class="card-img"
          src="images/camping.jpg"
          alt="tent in mountains"
        />
        <img class="icon" src="images/fire_icon.png" alt="fire icon" />
        <h2>Camping</h2>
      </section>
      <section class="photo">
        <img class="card-img" src="images/rapids.jpg" alt="rafting boat" />
        <img class="icon" src="images/oars.png" alt="oars icon" />
        <h2>Rapids</h2>
      </section>
    </main>
    <footer>
      <p>Russell M. Nelson</p>
      <p>President of the Church of Jesus Christ of Latter Day Saints</p>
      </div>
    </footer>
  </body>
</html>
